name: Mersin Haber Bot

on:
  workflow_dispatch: # Sadece manuel tetiklemeye izin ver (Ana sunucu Oracle VM oldu)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # posted_news.json'u commit etmek için yazma izni gerekli

    steps:
      - name: Kodu İndir (Checkout)
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları Yükle
        run: npm install

      - name: Botu Çalıştır
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMGUR_CLIENT_ID: ${{ secrets.IMGUR_CLIENT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # CI ortamında Telegram polling devre dışı — Railway instance ile 409 çakışmasını önler
          # Haber otomatik onaylanarak yayınlanır (Telegram onayı beklenmez)
          DISABLE_TELEGRAM: "true"
        run: node test_once.js

      - name: State'i (posted_news.json) Güncelle
        # Eğer posted_news.json değiştiyse, Github'a geri push et.
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add posted_news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update posted news [skip ci]" && git push)
